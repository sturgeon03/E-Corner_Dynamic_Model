# yaw_rate_steering_controller 설정 템플릿
# ----------------------------------------------------------------------------
# 이 파일은 quick_plot_controller.py의 --controller-config로 로드할 수 있습니다.
# 운영 코드에서는 이 파일 구조를 그대로 복사해서 프로젝트별 설정 파일로 사용하세요.
#
# 출력 타입 선택은 YAML 키가 아니라 함수 호출로 결정합니다.
# - 토크 출력: controller.compute_torque_command(...)
# - 조향각 출력: controller.compute_angle_command(...)
# ----------------------------------------------------------------------------

controller:
  # 권장 모드 3개만 운영
  # - ff      : feedforward only
  # - ff_fb   : feedforward + feedback
  # - ff_fb_ls: feedforward + feedback + estimator(RLS)
  mode: ff_fb_ls

  # null이면 패키지 기본 경로 사용
  vehicle_config_path: null
  gains_path: null

mode_mapping:
  ff:
    enable_yaw_feedback: false
    enable_fy_feedback: false
    enable_steer_feedback: false
    enable_estimator: false

  ff_fb:
    enable_yaw_feedback: true
    enable_fy_feedback: true
    fy_feedback_source: estimate
    use_lateral_force_estimator: true
    enable_steer_feedback: true
    enable_estimator: false

  ff_fb_ls:
    enable_yaw_feedback: true
    enable_fy_feedback: true
    fy_feedback_source: estimate
    use_lateral_force_estimator: true
    use_slip_angle_estimator: true
    enable_steer_feedback: true
    enable_estimator: true
    enable_b_estimator: true
    enable_c_alpha_estimator: true

advanced:
  # false면 mode_mapping 결과를 그대로 사용
  # true면 아래 override로 최종 옵션을 덮어씀
  enabled: false

  # 권장 키: controller_options_override
  # (호환성 때문에 block_controller_options_override도 읽어줌)
  controller_options_override:
    dt: 0.001

    # Fy 피드백 소스
    # - measured: state.fy_tire 사용 (시뮬/계측 장비 중심)
    # - estimate: ay 기반 추정 사용 (실차 권장)
    fy_feedback_source: estimate

    # 추정기 입력 경로
    use_lateral_force_estimator: true
    use_slip_angle_estimator: true

    # RLS 추정기 on/off
    enable_estimator: true

    # 파라미터별 추정 on/off
    # - B: 조향 점성 파라미터
    # - C_alpha: 코너링 강성
    # 참고: compute_angle_command 경로는 B 추정을 자동으로 건너뜁니다.
    enable_b_estimator: false
    enable_c_alpha_estimator: true

    estimator_forgetting_factor: 0.999
    estimator_p0: 3.5

    steer_ff_max_accel: null
    steer_ff_torque_limit: null

input_contract:
  required_state_keys:
    - yaw_rate
    - vx
    - steering_angle
  required_ref_keys:
    - yaw_rate

  recommended_state_keys_for_estimate:
    - ay
    - delta_dot

  simulation_only_optional_state_keys:
    - fy_tire
    - steering_torque_axis
    - alpha

notes:
  - 기본 모드는 ff_fb_ls를 권장합니다.
  - 실차에서는 fy_feedback_source=estimate가 일반적으로 더 현실적입니다.
  - 제어 루프별로 컨트롤러 인스턴스를 분리해서 사용하세요.
