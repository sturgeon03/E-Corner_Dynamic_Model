# Standard Vehicle Configuration
# Central parameter file for the vehicle dynamics model.

# ========================================
# Vehicle Specification
# ========================================
vehicle_spec:
  # Wheel and tire geometry shared by drive/tire modules.
  wheel:
    R_eff: 0.321  # Effective tire radius [m]

    # Wheel rotational inertia and viscous drag by axle.
    # Front: wheel + brake disc.
    # Rear: wheel + brake disc + motor/driveline equivalent inertia.
    J_wheel_front: 1.781  # Front wheel inertia [kg*m^2]
    J_wheel_rear: 1.781  # Rear wheel inertia [kg*m^2]
    B_wheel_front: 0.34  # Front wheel viscous damping [N*m*s/rad]
    B_wheel_rear: 0.34  # Rear wheel viscous damping [N*m*s/rad]

  # Vehicle geometry in the body frame.
  geometry:
    L_track: 1.634  # Track width [m]
    L_wheelbase: 2.97  # Wheelbase [m]

    # Static sprung-mass load split by axle.
    front_load_ratio: 0.611  # Front axle load ratio [-]
    rear_load_ratio: 0.389  # Rear axle load ratio [-]

    # Corner offsets relative to CG (x: forward+, y: left+) [m].
    corner_offsets:
      FL:
        x: 1.155
        y: 0.817
      FR:
        x: 1.155
        y: -0.817
      RL:
        x: -1.815
        y: 0.817
      RR:
        x: -1.815
        y: -0.817

# ========================================
# Actuator Parameters
# ========================================

brake:
  # First-order brake clamp force actuator.
  tau: 0.1  # Time constant [s]
  mu_pad: 0.35  # Pad-disc friction coefficient [-]
  V_d: 1.0e-7  # Pump displacement [m^3/rev]
  R_rotor: 0.12  # Effective rotor radius [m]
  A_eff: 0.0012566  # Effective caliper piston area [m^2]
  p_max_bar: 200  # Maximum system pressure [bar]

drive:
  max_wheel_speed: 60.63  # Wheel speed limit [rad/s]

suspension:
  # Axle-specific spring rates.
  K_spring_front: 43000 #54000  # Front spring rate [N/m]
  K_spring_rear: 40000 #48000  # Rear spring rate [N/m]

  # Damper coefficients split by axle and stroke direction.
  damper_front:
    compression: 1400.2  # Front compression damping [N*s/m]
    rebound: 2800.2  # Front rebound damping [N*s/m]
  damper_rear:
    compression: 1100  # Rear compression damping [N*s/m]
    rebound: 3400  # Rear rebound damping [N*s/m]

  # Kinematic and actuator parameters.
  z_CG0: 0.654  # Static CG height [m]
  delta_s_min: -0.20  # Minimum suspension stroke [m]
  delta_s_max: 0.20  # Maximum suspension stroke [m]
  lead: 0.01  # Ball-screw lead [m/rev]
  efficiency: 0.9  # Suspension actuator efficiency [-]
  F_active_max: 8000.0  # Active suspension force limit [N]

steering:
  # Parameters for the steering actuator model:
  # J_cq * ddot(delta) + B_cq * dot(delta) = T_str * gear_ratio - T_align
  J_cq: 0.0738  # Equivalent steering inertia [kg*m^2]
  B_cq: 85.61  # Steering viscous damping [N*m*s/rad]
  gear_ratio: 118.0  # Motor-shaft to steering-axis torque ratio [-]
  max_rate: 6283.185  # Steering rate limit [rad/s]
  efficiency: 1.0  # Steering system efficiency [-]

  # Asymmetric wheel-angle limits (CCW positive, CW negative).
  left:
    max_angle_pos: 1.047198  # +60 deg
    max_angle_neg: -1.710422  # -98 deg
  right:
    max_angle_pos: 1.710422  # +98 deg
    max_angle_neg: -1.047198  # -60 deg

# ========================================
# Tire Parameters
# ========================================
tire:
  mu: 1.0  # Shared friction coefficient [-]

  longitudinal:
    C_x: 231500  # Longitudinal tire stiffness coefficient
    v_min: 0.1  # Minimum speed for slip-ratio calculation [m/s]

  lateral:
    C_alpha: 115000  # Cornering stiffness [N/rad]
    trail: 0.02635  # Pneumatic trail [m]

  vertical:
    K_t: 399500.0  # Vertical tire stiffness [N/m]39
    C_t: 708.6  # Vertical tire damping [N*s/m]
    delta_t_max: 0.321  # Maximum tire compression [m]
    K_hard: 40000000.0  # Hard-stop penalty stiffness [N/m]

unsprung:
  m_u_front: 74.120  # Front unsprung mass per corner [kg]
  m_u_rear: 54.995  # Rear unsprung mass per corner [kg]

physics:
  g: 9.81  # Gravity [m/s^2]

vehicle_body:
  m: 1806.8  # Sprung mass [kg]

  inertia:
    Ixx: 749.84  # Roll inertia [kg*m^2]
    Iyy: 2732.2  # Pitch inertia [kg*m^2]
    Izz: 2900.3  # Yaw inertia [kg*m^2]
    Ixz: 0.0  # Product of inertia in xz plane [kg*m^2]

# ========================================
# Integrated Lateral Controller
# ========================================
lateral_controller:
  # Yaw-rate feedback: Mz_fb = PID(r_cmd - r_meas)
  yaw_rate_pid:
    kp: 1200.0
    ki: 40.0
    kd: 20.0

  # Steering-angle tracking to steering torque per wheel.
  steer_torque_pid:
    kp: 80.0
    ki: 0.0
    kd: 2.0
    # Optional per-wheel overrides:
    # per_wheel:
    #   FL: {kp: 80.0, ki: 0.0, kd: 2.0}
    #   FR: {kp: 80.0, ki: 0.0, kd: 2.0}
    #   RL: {kp: 80.0, ki: 0.0, kd: 2.0}
    #   RR: {kp: 80.0, ki: 0.0, kd: 2.0}

  yaw_moment_feedforward:
    max_yaw_accel: 5.0
    torque_limit: 6000.0

  yaw_moment_allocator:
    min_abs_x: 1.0e-6

  lateral_force_estimator:
    ay_bias: 0.0
    lowpass_tau: 0.05
    max_abs_ay: 20.0

  slip_angle_estimator:
    ay_bias: 0.0
    lowpass_tau: 0.05
    vy_init: 0.0
    vy_limit: 20.0
    leak_tau: 2.0
    min_vx: 0.3

  steering_feedforward:
    clamp_fy: true
    unwrap_delta: true

  behavior:
    use_estimated_fy_bias: false
    use_estimated_vy_ref: false

  output_limits:
    yaw_moment: 6000.0
    steer_torque: 120.0
